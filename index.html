<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoryVerse – Card Matching Game</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HOMEPAGE -->
<div id="homepage">
  <div class="logo-badge">🃏</div>
  <h1 class="home-title">MemoryVerse</h1>
  <p class="home-sub">Flip. Match. Win. A visually stunning card-matching game that challenges your memory.</p>

  <p class="difficulty-label">Choose Difficulty</p>
  <div class="diff-grid">
    <button class="diff-btn active" data-diff="easy">Easy (4×3)</button>
    <button class="diff-btn" data-diff="medium">Medium (4×4)</button>
    <button class="diff-btn" data-diff="hard">Hard (6×4)</button>
  </div>

  <p class="theme-label">Choose Theme</p>
  <div class="theme-grid">
    <button class="theme-pill active" data-theme="animals">🐾 Animals</button>
    <button class="theme-pill" data-theme="space">🚀 Space</button>
    <button class="theme-pill" data-theme="food">🍕 Food</button>
    <button class="theme-pill" data-theme="sports">⚽ Sports</button>
  </div>

  <button class="start-btn" id="startBtn">Launch Game ✦</button>

  <div class="home-stats">
    <div class="stat-item"><div class="stat-num" id="bestMoveStat">–</div><div class="stat-lbl">Best Moves</div></div>
    <div class="stat-item"><div class="stat-num" id="bestTimeStat">–</div><div class="stat-lbl">Best Time</div></div>
    <div class="stat-item"><div class="stat-num" id="gamesPlayedStat">0</div><div class="stat-lbl">Games Played</div></div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen">
  <div class="game-header">
    <div class="game-logo">MemoryVerse</div>
    <div class="hud">
      <div class="hud-chip"><span class="label">Moves</span><span class="value accent" id="moveCount">0</span></div>
      <div class="hud-chip"><span class="label">Pairs</span><span class="value gold" id="pairCount">0 / 0</span></div>
      <div class="hud-chip"><span class="label">Time</span><span class="value" id="timerDisplay">0s</span></div>
    </div>
    <button class="back-btn" id="backBtn">← Home</button>
  </div>

  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timerBar" style="width:100%"></div>
  </div>

  <div id="gameBoard"></div>
</div>

<!-- WIN SCREEN -->
<div id="winOverlay">
  <div class="win-card">
    <span class="win-emoji">🏆</span>
    <h2 class="win-title">You Won!</h2>
    <p class="win-sub">Amazing memory! You matched all the cards.</p>

    <div class="win-stats">
      <div class="win-stat"><div class="num" id="winMoves">–</div><div class="lbl">Moves</div></div>
      <div class="win-stat"><div class="num" id="winTime">–</div><div class="lbl">Seconds</div></div>
      <div class="win-stat"><div class="num" id="winScore">–</div><div class="lbl">Score</div></div>
    </div>

    <div class="win-actions">
      <button class="win-play-again" id="playAgainBtn">Play Again</button>
      <button class="win-home" id="winHomeBtn">Home</button>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
